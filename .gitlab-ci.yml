include:
  - template: Security/SAST.gitlab-ci.yml
  - template: Security/Secret-Detection.gitlab-ci.yml

workflow:
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH

stages:
  - lint
  - unit
  - security
  - build

variables:
  http_proxy: "http://proxy.its.maine.edu:3128"
  https_proxy: "http://proxy.its.maine.edu:3128"
  no_proxy: "127.0.0.1,localhost,*.maine.edu"
  PY_COLORS: '1'
  # Without this, the SAST template's default rules only fire via
  # $CI_COMMIT_BRANCH on branch pipelines; combined with the workflow dedup
  # above (which skips the branch pipeline once an MR is open), the `sast`
  # job would silently run on neither pipeline. See the gitlab-ci skill.
  AST_ENABLE_MR_PIPELINES: 'true'

# All runtime deps are on public PyPI — no private index, no .netrc.
.python_setup: &python_setup
  - pip install uv
  - uv pip install --system -e .[dev]

lint:
  stage: lint
  needs: []
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
  image: python:3.12-slim
  script:
    - *python_setup
    - ruff check .

typecheck:
  stage: lint
  needs: []
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
  image: python:3.12-slim
  script:
    - apt-get update -qq && apt-get install -y --no-install-recommends libatomic1
    - *python_setup
    - mypy certinext_zabbix
    - pyright

unit-test:
  stage: unit
  needs: [lint, typecheck]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH
  image: python:${PYTHON_VERSION}-slim
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.11", "3.12", "3.13", "3.14"]
  script:
    - *python_setup
    - pytest tests/ -v --junitxml=report.xml
  artifacts:
    when: always
    reports:
      junit: report.xml
    expire_in: 1 week

sast:
  stage: security
  needs: []
  variables:
    GIT_DEPTH: 0

semgrep-sast:
  stage: security
  needs: []
  allow_failure: false

secret_detection:
  stage: security
  needs: []
  allow_failure: false
  variables:
    GIT_DEPTH: 0

build:
  stage: build
  needs: [lint, typecheck, unit-test, semgrep-sast, secret_detection]
  rules:
    - if: $CI_COMMIT_TAG
      when: never
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH
  image: python:3.12-slim
  script:
    - pip install build
    - python -m build

# Publish to PyPI — not enabled yet (see the PyPI section in CLAUDE.md).
# Unlike the stored-token approach this stub used to describe, the actual
# publish path (matching `certinext`) lives on the GitHub mirror, not here:
# `.github/workflows/ci.yml`'s `publish-pypi` job uses OIDC trusted
# publishing (`pypa/gh-action-pypi-publish`, `permissions: id-token: write`)
# — no PyPI token stored on either GitLab or GitHub. That job is already
# present and already gated to `v*` tag pushes; it just fails cleanly at
# the publish step until `certinext-zabbix` is registered as a trusted
# publisher on pypi.org (Project → Publishing → add GitHub publisher,
# pointing at this repo's `ci.yml` workflow and the `pypi` environment).
# To flip PyPI publishing on: do that registration — no CI/CD changes
# needed here or on GitHub.
