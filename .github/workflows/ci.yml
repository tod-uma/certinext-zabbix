name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install uv
      - run: uv sync --locked --extra dev
      - run: uv run ruff check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install uv
      - run: uv sync --locked --extra dev
      - run: uv run mypy certinext_zabbix
      - run: uv run pyright

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - run: pip install uv
      - run: uv sync --locked --extra dev --python ${{ matrix.python-version }}
      - run: uv run pytest tests/ -v --junitxml=report.xml
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results-${{ matrix.python-version }}
          path: report.xml
          retention-days: 7

  publish-test-results:
    runs-on: ubuntu-latest
    needs: test
    if: always()
    permissions:
      checks: write
      pull-requests: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: test-results-*
          merge-multiple: true
          path: artifacts
      - uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: artifacts/**/*.xml
          check_name: Test Results

  # Commented out on purpose — not ready to publish to PyPI yet, and don't
  # want a stray `v*` tag push to do it accidentally. To re-enable:
  # uncomment this job, uncomment `needs: [publish-pypi]` below in
  # `release` (restores the "only release after a successful PyPI publish"
  # ordering), and register certinext-zabbix as a PyPI trusted publisher
  # (pypi.org → Project → Publishing → add GitHub publisher, pointing at
  # this repo's `ci.yml` workflow and the `pypi` environment). See the
  # PyPI section in CLAUDE.md.
  #
  # publish-pypi:
  #   runs-on: ubuntu-latest
  #   needs: [lint, typecheck, test]
  #   if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
  #   permissions:
  #     id-token: write
  #   environment:
  #     name: pypi
  #     url: https://pypi.org/p/certinext-zabbix
  #   steps:
  #     - uses: actions/checkout@v6
  #     - uses: actions/setup-python@v6
  #       with:
  #         python-version: "3.12"
  #     - run: pip install build
  #     - run: python -m build
  #     - uses: pypa/gh-action-pypi-publish@release/v1

  release:
    runs-on: ubuntu-latest
    # Normally needs: [publish-pypi], so release only cuts after a
    # successful PyPI publish. publish-pypi is commented out above, so
    # this borrows its needs list directly to keep waiting on green CI.
    # Swap back to `needs: [publish-pypi]` when re-enabling PyPI.
    needs: [lint, typecheck, test]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      # Read the release notes from the annotated tag message so GitLab and
      # GitHub show identical, curated notes. The tag is pushed to GitHub by
      # the GitLab→GitHub mirror, so the annotated tag object is available.
      - name: Read tag message
        id: tag_message
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          MSG=$(gh api repos/${{ github.repository }}/git/refs/tags/${{ github.ref_name }} \
            --jq '.object.sha' | \
            xargs -I{} gh api repos/${{ github.repository }}/git/tags/{} \
            --jq '.message // ""')
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$MSG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      # action-gh-release has no auto-detection for pre-release tags (e.g.
      # v1.0.0rc4) and defaults to a full release, so compute it ourselves.
      - name: Determine prerelease status
        id: prerelease
        run: |
          if [[ "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "value=false" >> "$GITHUB_OUTPUT"
          else
            echo "value=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: softprops/action-gh-release@v3
        with:
          body: ${{ steps.tag_message.outputs.body }}
          files: dist/*
          prerelease: ${{ steps.prerelease.outputs.value }}
